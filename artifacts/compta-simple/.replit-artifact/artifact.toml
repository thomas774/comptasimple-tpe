kind = "web"
previewPath = "/"
title = "ComptaSimple TPE"
version = "1.0.0"
id = "artifacts/compta-simple"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21244

[services.development]
run = "pnpm --filter @workspace/compta-simple run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compta-simple", "run", "build" ]
publicDir = "artifacts/compta-simple/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21244"
BASE_PATH = "/"
